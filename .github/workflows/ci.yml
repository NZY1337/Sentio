name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  server-tests:
    name: Server Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --runInBand

  server-sanity-search:
    name: Server Sanity Search
    runs-on: ubuntu-latest
    if: ${{ secrets.DATABASE_URL != '' && secrets.OPENAI_API_KEY != '' }}
    defaults:
      run:
        working-directory: server
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_PROJECT_ID: ${{ secrets.OPENAI_PROJECT_ID }}
      PORT: "3010"
      CLERK_WEBHOOK_SIGNING_SECRET: "ci-dummy"
      FORWARDED_PORT: "3010"
      JWT_SECRET: "ci-dummy"
      JWT_REFRESH_SECRET: "ci-dummy"
      SMTP_PASSWORD: "ci-dummy"
      AWS_BUCKET_NAME: "ci-dummy"
      AWS_BUCKET_REGION: "eu-west-3"
      AWS_USER_ACCESS_KEY: "ci-dummy"
      AWS_USER_SECRET_ACCESS_KEY: "ci-dummy"
      REIMAGINE__API_KEY: "ci-dummy"
      SUPABASE_KEY: "ci-dummy"
      SUPABASE_URL: "https://example.supabase.co"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run sanity search
        run: npm run sanity:search
