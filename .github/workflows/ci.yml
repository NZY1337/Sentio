name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  server-tests:
    name: Server Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run generate

      - name: Run unit tests (exclude integration)
        run: npm test -- --run --exclude src/**/__tests__/**/*.int.test.ts --passWithNoTests

  server-sanity-search:
    name: Server Sanity Search
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_PROJECT_ID: ${{ secrets.OPENAI_PROJECT_ID }}
      PORT: "3010"
      CLERK_WEBHOOK_SIGNING_SECRET: "ci-dummy"
      FORWARDED_PORT: "3010"
      JWT_SECRET: "ci-dummy"
      JWT_REFRESH_SECRET: "ci-dummy"
      
      SMTP_PASSWORD: "ci-dummy"
      AWS_BUCKET_NAME: "ci-dummy"
      AWS_BUCKET_REGION: "eu-west-3"
      AWS_USER_ACCESS_KEY: "ci-dummy"
      AWS_USER_SECRET_ACCESS_KEY: "ci-dummy"
      REIMAGINE__API_KEY: "ci-dummy"
      SUPABASE_KEY: "ci-dummy"
      SUPABASE_URL: "https://example.supabase.co"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        id: precheck
        shell: bash
        run: |
          if [ -z "$DATABASE_URL" ] || [ -z "$OPENAI_API_KEY" ]; then
            echo "missing=true" >> "$GITHUB_OUTPUT"
            echo "Skipping sanity search because DATABASE_URL or OPENAI_API_KEY is missing."
          else
            echo "missing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: ${{ steps.precheck.outputs.missing == 'false' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        if: ${{ steps.precheck.outputs.missing == 'false' }}
        run: npm ci

      - name: Generate Prisma Client
        if: ${{ steps.precheck.outputs.missing == 'false' }}
        run: npm run generate

      - name: Run sanity search
        if: ${{ steps.precheck.outputs.missing == 'false' }}
        run: npm run sanity:search
